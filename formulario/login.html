<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LuckPet</title>
    <link rel="shortcut icon" href="perfil.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="decoration-layer">
            <div class="decoration-shape shape-1"></div>
            <div class="decoration-shape shape-2"></div>
            <div class="decoration-shape shape-3"></div>
            <div class="floating-pet">
                <i class="fas fa-paw"></i>
            </div>
            <div class="floating-pet pet-2">
                <i class="fas fa-cat"></i>
            </div>
            <div class="floating-pet pet-3">
                <i class="fas fa-dog"></i>
            </div>
        </div>
        
        <div class="auth-card">
            <div class="auth-header">
                <a href="../index.html" class="logo">
                    <i class="fas fa-paw"></i>
                    Luck<span>Pet</span>
                </a>
                <h2>Welcome back!</h2>
                <p>Log in to your account or create a new one</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">
                    <i class="fas fa-sign-in-alt"></i>
                    Login
                </button>
                <button class="tab-btn" data-tab="signup">
                    <i class="fas fa-user-plus"></i>
                    Sign Up
                </button>
            </div>

            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">E-mail</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" required placeholder="seu@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" required placeholder="Sua Password">
                        <button type="button" class="toggle-password" aria-label="Mostrar Password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span class="btn-text">Login</span>
                    <div class="btn-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>
            </form>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="signupEmail">E-mail</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" required placeholder="seu@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" required placeholder="Crie uma Password segura">
                        <button type="button" class="toggle-password" aria-label="Mostrar Password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <span class="strength-text">Força da Password</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="signupName">Nome do seu pet</label>
                    <div class="input-with-icon">
                        <i class="fas fa-paw"></i>
                        <input type="text" id="signupName" required placeholder="Ex: Bob, Luna, Thor">
                    </div>
                </div>
                <div class="form-group">
                    <label>Escolha um avatar</label>
                    <div class="avatar-options">
                        <div class="avatar-option">
                            <input type="radio" id="avatar-dog" name="avatar" value="cachorro" checked>
                            <label for="avatar-dog">
                                <img src="../img/avatares/cachorro.jpg" alt="Cachorro">
                                <div class="avatar-check"><i class="fas fa-check"></i></div>
                            </label>
                            <span>Cachorro</span>
                        </div>
                        <div class="avatar-option">
                            <input type="radio" id="avatar-cat" name="avatar" value="gato">
                            <label for="avatar-cat">
                                <img src="../img/avatares/gato.jpg" alt="Gato">
                                <div class="avatar-check"><i class="fas fa-check"></i></div>
                            </label>
                            <span>Gato</span>
                        </div>
                        <div class="avatar-option">
                            <input type="radio" id="avatar-rabbit" name="avatar" value="coelho">
                            <label for="avatar-rabbit">
                                <img src="../img/avatares/coelho.jpg" alt="Coelho">
                                <div class="avatar-check"><i class="fas fa-check"></i></div>
                            </label>
                            <span>Coelho</span>
                        </div>
                        <div class="avatar-option">
                            <input type="radio" id="avatar-bird" name="avatar" value="pássaro">
                            <label for="avatar-bird">
                                <img src="../img/avatares/passaro.jpg" alt="Pássaro">
                                <div class="avatar-check"><i class="fas fa-check"></i></div>
                            </label>
                            <span>Pássaro</span>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-primary">
                    <span class="btn-text">Criar conta</span>
                    <div class="btn-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>

                <!-- Botão de Login como Convidado -->
                <div class="guest-login-container" style="margin-top: 20px; text-align: center;">
                    <div style="border-top: 1px solid #e9ecef; margin: 20px 0; position: relative;">
                        <span style="background: white; padding: 0 15px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #666; font-size: 14px;">
                            ou
                        </span>
                    </div>
                    
                    <button type="button" id="guestLoginBtn" class="btn-guest" style="
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        border: none;
                        padding: 15px 30px;
                        border-radius: 25px;
                        font-size: 16px;
                        font-weight: 600;
                        cursor: pointer;
                        width: 100%;
                        transition: all 0.3s ease;
                        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
                    ">
                        <i class="fas fa-user-clock"></i> Login as Guest
                    </button>
                    
                    <p style="color: #666; font-size: 12px; margin-top: 10px;">
                        ⚡ Quick access without registration. Data is saved only in this session.
                    </p>
                </div>
            </form>
            

            <div class="auth-footer">
                <p>By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
            </div>
        </div>
    </div>

    <div class="notification-toast" id="notificationToast">
        <div class="toast-content">
            <i class="toast-icon"></i>
            <span class="toast-message"></span>
        </div>
        <button class="toast-close">
            <i class="fas fa-times"></i>
        </button>
    </div>

 <script src="../auth-manager.js"></script>
<script src="auth.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🔐 ?? Login page loaded!');
        
        // Verificar se as tabs estão funcionando
        const tabs = document.querySelectorAll('.tab-btn');
        console.log('Número de tabs:', tabs.length);
        
        // Testar notificação
        setTimeout(function() {
            if (typeof showNotification === 'function') {
                showNotification('✅ Sistema carregado com sucesso!', 'success');
            }
        }, 1000);
    });
</script>
</body>
</html>
